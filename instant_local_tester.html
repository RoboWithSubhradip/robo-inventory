<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSmart Inventory - Local Desktop Console</title>
    
    <!-- React & ReactDOM (Development Version) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel compiler for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Configure Babel to use classic runtime cleanly -->
    <script>
        Babel.registerPreset('custom-react', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars for navbar tab slider */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @media print {
            body {
                background: white;
                color: black;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- React App Script configured to compile using our safe custom preset -->
    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useMemo } = React;

        // Custom Simple Inline Icons (Lucide SVG implementations)
        const Icons = {
          Dashboard: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
            </svg>
          ),
          Components: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
          ),
          Products: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
            </svg>
          ),
          Dispatches: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" />
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0" />
            </svg>
          ),
          History: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          ),
          Plus: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
          ),
          Minus: () => (
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 12H6" />
            </svg>
          ),
          Warning: () => (
            <svg className="w-5 h-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          ),
          Robot: () => (
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
            </svg>
          ),
          ArrowUp: () => (
            <svg className="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18" />
            </svg>
          ),
          ArrowDown: () => (
            <svg className="w-4 h-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
          ),
          Photo: () => (
            <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          )
        };

        const defaultComponents = [];
        const defaultProducts = [];
        const defaultPurchaseLogs = [];
        const defaultBuildLogs = [];
        const defaultDispatchLogs = [];

        // Rich demo assets with fallback placeholder SVGs / mock images
        const demoComponents = [
          { sku: 'SW-001', name: 'Lithium Polymer Battery (24V 10Ah)', category: 'Power', stock: 120, unitPrice: 7500.00, minStock: 20, image: 'https://images.unsplash.com/photo-1593941707882-a5bba14938c7?auto=format&fit=crop&w=300&q=80' },
          { sku: 'SW-002', name: 'BLDC Hub Motor (250W)', category: 'Actuators', stock: 45, unitPrice: 9800.00, minStock: 10, image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=300&q=80' },
          { sku: 'SW-003', name: 'Nvidia Jetson Orin Nano (8GB)', category: 'Controllers', stock: 15, unitPrice: 42000.00, minStock: 5, image: 'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=300&q=80' },
          { sku: 'SW-004', name: 'RPLIDAR A2M8 Laser Range Scanner', category: 'Sensors', stock: 8, unitPrice: 24000.00, minStock: 4, image: 'https://images.unsplash.com/photo-1504639725590-34d0984388bd?auto=format&fit=crop&w=300&q=80' },
          { sku: 'SW-005', name: 'Anodized Aluminum Chassis Profiles (1m)', category: 'Mechanics', stock: 200, unitPrice: 1200.00, minStock: 50, image: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=300&q=80' },
          { sku: 'SW-006', name: 'IMU 9-DOF Sensor Module', category: 'Sensors', stock: 35, unitPrice: 1050.00, minStock: 10, image: '' }
        ];

        const demoProducts = [
          {
            id: 'PROD-01',
            name: 'Rover-X1 Autonomous Explorer',
            description: 'Outdoor autonomous wheel-based research robot with LiDAR mapping capabilities.',
            stock: 5,
            image: 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=600&q=80',
            bom: [
              { sku: 'SW-001', qty: 1 },
              { sku: 'SW-002', qty: 4 },
              { sku: 'SW-003', qty: 1 },
              { sku: 'SW-004', qty: 1 },
              { sku: 'SW-005', qty: 6 }
            ]
          },
          {
            id: 'PROD-02',
            name: 'HexaArm Modular Manipulator',
            description: '6-Axis lightweight high-precision robotic arm for desktop assembling automation.',
            stock: 2,
            image: 'https://images.unsplash.com/photo-1563770660941-20978e870e26?auto=format&fit=crop&w=600&q=80',
            bom: [
              { sku: 'SW-002', qty: 6 },
              { sku: 'SW-003', qty: 1 },
              { sku: 'SW-005', qty: 4 },
              { sku: 'SW-006', qty: 1 }
            ]
          }
        ];

        // Flat structural history matching the requested specifications
        const demoPurchaseLogs = [];
        const demoBuildLogs = [];
        const demoDispatchLogs = [];

        function App() {
          const [components, setComponents] = useState(() => {
            const saved = localStorage.getItem('robo_components');
            return saved ? JSON.parse(saved) : defaultComponents;
          });

          const [products, setProducts] = useState(() => {
            const saved = localStorage.getItem('robo_products');
            return saved ? JSON.parse(saved) : defaultProducts;
          });

          const [purchases, setPurchases] = useState(() => {
            const saved = localStorage.getItem('robo_purchases');
            return saved ? JSON.parse(saved) : defaultPurchaseLogs;
          });

          const [buildLogs, setBuildLogs] = useState(() => {
            const saved = localStorage.getItem('robo_builds');
            return saved ? JSON.parse(saved) : defaultBuildLogs;
          });

          const [dispatchLogs, setDispatchLogs] = useState(() => {
            const saved = localStorage.getItem('robo_dispatches');
            return saved ? JSON.parse(saved) : defaultDispatchLogs;
          });

          // Stock Issue / Component consumption state with Issue Serial Number
          const [issueLogs, setIssueLogs] = useState(() => {
            const saved = localStorage.getItem('robo_issues');
            return saved ? JSON.parse(saved) : [];
          });

          // Dynamic state for active layout tabs
          const [activeTab, setActiveTab] = useState('dashboard');
          const [searchTerm, setSearchTerm] = useState('');
          const [componentCategoryFilter, setComponentCategoryFilter] = useState('All');
          const [componentsViewMode, setComponentsViewMode] = useState('grid');
          const [errorMessage, setErrorMessage] = useState('');
          const [successMessage, setSuccessMessage] = useState('');

          // Modal state
          const [modalType, setModalType] = useState(null); 
          const [activeInvoice, setActiveInvoice] = useState(null); // Active printable invoice model object

          // Auto-save mechanisms
          useEffect(() => {
            localStorage.setItem('robo_components', JSON.stringify(components));
          }, [components]);

          useEffect(() => {
            localStorage.setItem('robo_products', JSON.stringify(products));
          }, [products]);

          useEffect(() => {
            localStorage.setItem('robo_purchases', JSON.stringify(purchases));
          }, [purchases]);

          useEffect(() => {
            localStorage.setItem('robo_builds', JSON.stringify(buildLogs));
          }, [buildLogs]);

          useEffect(() => {
            localStorage.setItem('robo_dispatches', JSON.stringify(dispatchLogs));
          }, [dispatchLogs]);

          useEffect(() => {
            localStorage.setItem('robo_issues', JSON.stringify(issueLogs));
          }, [issueLogs]);

          const triggerMessage = (type, message) => {
            if (type === 'success') {
              setSuccessMessage(message);
              setTimeout(() => setSuccessMessage(''), 4000);
            } else {
              setErrorMessage(message);
              setTimeout(() => setErrorMessage(''), 5000);
            }
          };

          const summaryMetrics = useMemo(() => {
            const totalPartsStock = components.reduce((acc, curr) => acc + curr.stock, 0);
            const totalInventoryValue = components.reduce((acc, curr) => acc + (curr.stock * curr.unitPrice), 0);
            const lowStockAlertsCount = components.filter(c => c.stock <= c.minStock).length;
            const totalFinishedRobots = products.reduce((acc, curr) => acc + curr.stock, 0);
            const totalDispatchedRobots = dispatchLogs.reduce((acc, curr) => acc + curr.items.reduce((sum, item) => sum + item.qty, 0), 0);

            return {
              totalPartsStock,
              totalInventoryValue,
              lowStockAlertsCount,
              totalFinishedRobots,
              totalDispatchedRobots
            };
          }, [components, products, dispatchLogs]);

          // FORM STATE INITIALIZATION

          // 1. Add/Register New Component SKU
          const [newComponentForm, setNewComponentForm] = useState({
            sku: '', name: '', category: 'Sensors', initialStock: 0, unitPrice: 0.00, minStock: 5, image: ''
          });

          // 2. Batch Purchase Stock-In Form (Dynamic multi-item table)
          const [batchStockInForm, setBatchStockInForm] = useState({
            vendorName: '',
            vendorAddress: '',
            purchaseDate: new Date().toISOString().split('T')[0],
            items: [{ sku: '', qty: 1, unitPrice: 0 }]
          });

          // 3. Dynamic Material Issue Stock-Out Form (Multi-item form with Serial Number)
          const generateIssueSerial = () => 'ISN-' + Date.now().toString().slice(-6) + '-' + Math.floor(100 + Math.random() * 900);
          
          const [issueForm, setIssueForm] = useState({
            serialNo: generateIssueSerial(),
            personName: '',
            purpose: '',
            date: new Date().toISOString().split('T')[0],
            items: [{ sku: '', qty: 1 }]
          });

          // 4. Create New Robotics Schema (BOM configuration helper)
          const [newProductForm, setNewProductForm] = useState({
            id: '', name: '', description: '', image: '', bomList: []
          });
          const [bomRowInput, setBomRowInput] = useState({ sku: '', qty: 1 });

          // 5. Robotics Production Batch Log Form (Assembles Finished Goods)
          const [productionBatchForm, setProductionBatchForm] = useState({
            productId: '',
            qty: 1,
            date: new Date().toISOString().split('T')[0],
            notes: ''
          });

          // 6. Customer Dispatch Order Form (Dynamic completed robots shipment & Automatic Bill generation)
          const [dispatchForm, setDispatchForm] = useState({
            customerName: '',
            personName: '',
            date: new Date().toISOString().split('T')[0],
            notes: '',
            items: [{ productId: '', qty: 1 }]
          });

          // --- OPERATIONS CONTROLLERS ---

          // FileReader base64 converter
          const handleFileRead = (e, callback) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 800 * 1024) { 
              triggerMessage('error', 'Image is too large! Please upload under 800 KB for offline browser safety.');
              return;
            }
            const reader = new FileReader();
            reader.onloadend = () => { callback(reader.result); };
            reader.readAsDataURL(file);
          };

          // Register individual raw SKU Component
          const handleRegisterComponent = (e) => {
            e.preventDefault();
            const formattedSku = newComponentForm.sku.trim().toUpperCase();
            if (!formattedSku || !newComponentForm.name.trim()) return triggerMessage('error', 'Please fill in SKU and Name.');
            if (components.some(c => c.sku === formattedSku)) return triggerMessage('error', `SKU ${formattedSku} already exists.`);

            const created = {
              sku: formattedSku,
              name: newComponentForm.name.trim(),
              category: newComponentForm.category,
              stock: Number(newComponentForm.initialStock),
              unitPrice: Number(newComponentForm.unitPrice),
              minStock: Number(newComponentForm.minStock),
              image: newComponentForm.image
            };

            setComponents(prev => [...prev, created]);

            // Save initial stock transaction if positive
            if (Number(newComponentForm.initialStock) > 0) {
              setPurchases(prev => [{
                id: 'BATCH-SETUP-' + Date.now(),
                vendorName: 'System Setup',
                vendorAddress: 'Warehouse initial deposit',
                date: new Date().toISOString().split('T')[0],
                items: [{ sku: formattedSku, qty: Number(newComponentForm.initialStock), unitPrice: Number(newComponentForm.unitPrice) }]
              }, ...prev]);
            }

            triggerMessage('success', `Component SKU ${formattedSku} added to registry.`);
            setModalType(null);
            setNewComponentForm({ sku: '', name: '', category: 'Sensors', initialStock: 0, unitPrice: 0.00, minStock: 5, image: '' });
          };

          // Dynamic row controls for batch stock-in
          const addBatchStockInRow = () => {
            setBatchStockInForm(prev => ({
              ...prev,
              items: [...prev.items, { sku: '', qty: 1, unitPrice: 0 }]
            }));
          };

          const removeBatchStockInRow = (index) => {
            if (batchStockInForm.items.length <= 1) return;
            setBatchStockInForm(prev => ({
              ...prev,
              items: prev.items.filter((_, i) => i !== index)
            }));
          };

          const handleBatchStockInRowChange = (index, field, value) => {
            const updated = [...batchStockInForm.items];
            updated[index][field] = value;
            
            // Auto fill current price from registry if SKU changed
            if (field === 'sku') {
              const comp = components.find(c => c.sku === value);
              if (comp) {
                updated[index]['unitPrice'] = comp.unitPrice;
              }
            }
            setBatchStockInForm(prev => ({ ...prev, items: updated }));
          };

          // Commit batch Stock-In purchase
          const handleSubmitBatchStockIn = (e) => {
            e.preventDefault();
            const { vendorName, vendorAddress, purchaseDate, items } = batchStockInForm;
            if (!vendorName.trim()) return triggerMessage('error', 'Please provide a valid Vendor name.');

            // Validate all rows
            for (let item of items) {
              if (!item.sku) return triggerMessage('error', 'Please choose a component SKU for all purchase rows.');
              if (item.qty <= 0) return triggerMessage('error', 'Purchase quantity must be positive.');
            }

            // Update components stocks
            setComponents(prev => prev.map(comp => {
              const matches = items.filter(i => i.sku === comp.sku);
              if (matches.length > 0) {
                const totalAdded = matches.reduce((sum, item) => sum + Number(item.qty), 0);
                // Set unit price to latest buying price if greater than 0
                const latestPrice = matches[matches.length - 1].unitPrice;
                return {
                  ...comp,
                  stock: comp.stock + totalAdded,
                  unitPrice: latestPrice > 0 ? Number(latestPrice) : comp.unitPrice
                };
              }
              return comp;
            }));

            // Log purchase transaction batch
            const newTransaction = {
              id: 'BATCH-IN-' + Date.now(),
              vendorName: vendorName.trim(),
              vendorAddress: vendorAddress.trim() || 'Not specified',
              date: purchaseDate,
              items: items.map(i => ({ sku: i.sku, qty: Number(i.qty), unitPrice: Number(i.unitPrice) }))
            };

            setPurchases(prev => [newTransaction, ...prev]);
            triggerMessage('success', `Batch Stock-In processed successfully for vendor "${vendorName}". Stocks incremented.`);
            
            // Clear form
            setBatchStockInForm({
              vendorName: '',
              vendorAddress: '',
              purchaseDate: new Date().toISOString().split('T')[0],
              items: [{ sku: '', qty: 1, unitPrice: 0 }]
            });
            setActiveTab('dashboard');
          };

          // Dynamic row controls for stock-out (Component Issue Form)
          const addIssueRow = () => {
            setIssueForm(prev => ({
              ...prev,
              items: [...prev.items, { sku: '', qty: 1 }]
            }));
          };

          const removeIssueRow = (index) => {
            if (issueForm.items.length <= 1) return;
            setIssueForm(prev => ({
              ...prev,
              items: prev.items.filter((_, i) => i !== index)
            }));
          };

          const handleIssueRowChange = (index, field, value) => {
            const updated = [...issueForm.items];
            updated[index][field] = value;
            setIssueForm(prev => ({ ...prev, items: updated }));
          };

          // Commit dynamic Material Issue Stock-out form
          const handleSubmitIssue = (e) => {
            e.preventDefault();
            const { serialNo, personName, purpose, date, items } = issueForm;
            if (!personName.trim() || !purpose.trim()) return triggerMessage('error', 'Person Name and Purpose are required.');

            // Validate stock availability and quantities
            for (let item of items) {
              if (!item.sku) return triggerMessage('error', 'Select a component SKU for all stock-out rows.');
              if (item.qty <= 0) return triggerMessage('error', 'Deduction quantity must be positive.');
              
              const compObj = components.find(c => c.sku === item.sku);
              if (!compObj) return triggerMessage('error', `SKU ${item.sku} does not exist.`);
              if (compObj.stock < item.qty) {
                return triggerMessage('error', `Insufficient stock for SKU ${item.sku}. On hand: ${compObj.stock}, requested: ${item.qty}`);
              }
            }

            // Deduct component stocks
            setComponents(prev => prev.map(comp => {
              const matchedIssue = items.find(i => i.sku === comp.sku);
              if (matchedIssue) {
                return {
                  ...comp,
                  stock: comp.stock - Number(matchedIssue.qty)
                };
              }
              return comp;
            }));

            // Save unified issue log with serial number
            const newIssueLog = {
              serialNo: serialNo.trim(),
              personName: personName.trim(),
              purpose: purpose.trim(),
              date: date,
              items: items.map(i => ({ sku: i.sku, qty: Number(i.qty) }))
            };

            setIssueLogs(prev => [newIssueLog, ...prev]);
            triggerMessage('success', `Components issued successfully under Serial No: ${serialNo}. Stock deducted.`);

            // Reset form
            setIssueForm({
              serialNo: generateIssueSerial(),
              personName: '',
              purpose: '',
              date: new Date().toISOString().split('T')[0],
              items: [{ sku: '', qty: 1 }]
            });
            setActiveTab('dashboard');
          };

          // Create Product BOM Row control
          const addBomRowItem = () => {
            if (!bomRowInput.sku) return triggerMessage('error', 'Please choose a component first.');
            if (bomRowInput.qty <= 0) return triggerMessage('error', 'Required quantity must be positive.');
            if (newProductForm.bomList.some(item => item.sku === bomRowInput.sku)) {
              return triggerMessage('error', 'This component is already configured in this Bill of Materials.');
            }
            setNewProductForm(prev => ({
              ...prev,
              bomList: [...prev.bomList, { sku: bomRowInput.sku, qty: Number(bomRowInput.qty) }]
            }));
            setBomRowInput({ sku: '', qty: 1 });
          };

          const removeBomRowItem = (sku) => {
            setNewProductForm(prev => ({
              ...prev,
              bomList: prev.bomList.filter(item => item.sku !== sku)
            }));
          };

          // Register Robotics Schema 
          const handleRegisterProduct = (e) => {
            e.preventDefault();
            const formattedId = newProductForm.id.trim().toUpperCase();
            if (!formattedId || !newProductForm.name.trim()) return triggerMessage('error', 'Product Model ID and Name are required.');
            if (newProductForm.bomList.length === 0) return triggerMessage('error', 'At least one component is required in the Bill of Materials (BOM).');
            if (products.some(p => p.id === formattedId)) return triggerMessage('error', `Model ID ${formattedId} already exists.`);

            const createdProduct = {
              id: formattedId,
              name: newProductForm.name.trim(),
              description: newProductForm.description.trim(),
              stock: 0,
              bom: newProductForm.bomList,
              image: newProductForm.image
            };

            setProducts(prev => [...prev, createdProduct]);
            triggerMessage('success', `Robotics model ${createdProduct.name} defined successfully.`);
            setModalType(null);
            setNewProductForm({ id: '', name: '', description: '', image: '', bomList: [] });
          };

          // Pre-assemble calculation helper for active build production check
          const activeProductionVerification = useMemo(() => {
            if (!productionBatchForm.productId) return { fits: false, details: [] };
            const selectedProd = products.find(p => p.id === productionBatchForm.productId);
            if (!selectedProd) return { fits: false, details: [] };

            let fits = true;
            const details = selectedProd.bom.map(bomItem => {
              const comp = components.find(c => c.sku === bomItem.sku);
              const totalRequired = bomItem.qty * productionBatchForm.qty;
              const currentStock = comp ? comp.stock : 0;
              const isSufficient = currentStock >= totalRequired;
              if (!isSufficient) fits = false;
              return { sku: bomItem.sku, name: comp ? comp.name : 'Unknown SKU', totalRequired, currentStock, isSufficient };
            });

            return { fits, details };
          }, [productionBatchForm.productId, productionBatchForm.qty, components, products]);

          // Execute Production Build Assembly (BOM stock deduction)
          const handleSubmitProductionBatch = (e) => {
            e.preventDefault();
            const { productId, qty, date, notes } = productionBatchForm;
            if (!productId) return triggerMessage('error', 'Please select a Robotics Model to build.');
            if (qty <= 0) return triggerMessage('error', 'Production quantity must be positive.');

            const robotModel = products.find(p => p.id === productId);
            if (!robotModel) return;

            if (!activeProductionVerification.fits) {
              return triggerMessage('error', 'Cannot construct robotics batch: Insufficient component materials in inventory.');
            }

            // Deduct raw material stocks
            setComponents(prev => prev.map(comp => {
              const matchedRequirement = robotModel.bom.find(b => b.sku === comp.sku);
              if (matchedRequirement) {
                const totalDeducted = matchedRequirement.qty * qty;
                return {
                  ...comp,
                  stock: comp.stock - totalDeducted
                };
              }
              return comp;
            }));

            // Increment finished good stock
            setProducts(prev => prev.map(p => {
              if (p.id === productId) {
                return { ...p, stock: p.stock + Number(qty) };
              }
              return p;
            }));

            // Log Build history batch
            const newBuild = {
              id: 'BUILD-' + Date.now(),
              productId,
              productName: robotModel.name,
              qty: Number(qty),
              date,
              notes: notes.trim() || 'Standard assembly line run'
            };

            setBuildLogs(prev => [newBuild, ...prev]);
            triggerMessage('success', `Production batch registered: Constructed +${qty} units of ${robotModel.name}. BOM parts deducted.`);
            
            // Clear Form
            setProductionBatchForm({
              productId: '',
              qty: 1,
              date: new Date().toISOString().split('T')[0],
              notes: ''
            });
            setActiveTab('products');
          };

          // Dynamic row controls for Client Dispatch Order Form
          const addDispatchRow = () => {
            setDispatchForm(prev => ({
              ...prev,
              items: [...prev.items, { productId: '', qty: 1 }]
            }));
          };

          const removeDispatchRow = (index) => {
            if (dispatchForm.items.length <= 1) return;
            setDispatchForm(prev => ({
              ...prev,
              items: prev.items.filter((_, i) => i !== index)
            }));
          };

          const handleDispatchRowChange = (index, field, value) => {
            const updated = [...dispatchForm.items];
            updated[index][field] = value;
            setDispatchForm(prev => ({ ...prev, items: updated }));
          };

          // Commits finished robotics products shipment & Generates Automatic Bill
          const handleSubmitDispatch = (e) => {
            e.preventDefault();
            const { customerName, personName, date, notes, items } = dispatchForm;
            if (!customerName.trim() || !personName.trim()) return triggerMessage('error', 'Client (Customer) Name and Authorized Person details are required.');

            // Verify completed robots stock availability
            for (let item of items) {
              if (!item.productId) return triggerMessage('error', 'Select a finished robot model for all dispatch rows.');
              if (item.qty <= 0) return triggerMessage('error', 'Shipment quantity must be positive.');

              const targetRobot = products.find(p => p.id === item.productId);
              if (!targetRobot) return triggerMessage('error', 'Robot Model does not exist.');
              if (targetRobot.stock < item.qty) {
                return triggerMessage('error', `Insufficient finished goods stock for ${targetRobot.name}. Available: ${targetRobot.stock}, requested dispatch: ${item.qty}`);
              }
            }

            // Deduct finished robot stocks
            setProducts(prev => prev.map(p => {
              const matchedDispatch = items.find(i => i.productId === p.id);
              if (matchedDispatch) {
                return {
                  ...p,
                  stock: p.stock - Number(matchedDispatch.qty)
                };
              }
              return p;
            }));

            // Assemble billing prices using cumulative pricing based on components inside the robot's BOM + nominal value markup
            const dispatchItemsData = items.map(item => {
              const robotModel = products.find(p => p.id === item.productId);
              
              // Calculate custom computed price based on its raw components BOM pricing plus 25% integration engineering fee
              const rawCost = robotModel.bom.reduce((sum, bomItem) => {
                const matchedComp = components.find(c => c.sku === bomItem.sku);
                const price = matchedComp ? matchedComp.unitPrice : 0;
                return sum + (price * bomItem.qty);
              }, 0);
              const calculatedPriceVal = rawCost > 0 ? Math.round(rawCost * 1.25) : 150000; // fallback default price if empty BOM

              return {
                productId: item.productId,
                productName: robotModel.name,
                qty: Number(item.qty),
                unitPrice: calculatedPriceVal,
                subtotal: calculatedPriceVal * Number(item.qty)
              };
            });

            const totalSum = dispatchItemsData.reduce((sum, item) => sum + item.subtotal, 0);
            const invoiceNo = 'INV-' + Date.now().toString().slice(-6) + '-' + Math.floor(100 + Math.random() * 900);

            const newDispatchLog = {
              id: 'BATCH-DISPATCH-' + Date.now(),
              customerName: customerName.trim(),
              contactPerson: personName.trim(),
              date,
              notes: notes.trim() || 'Dispatched for client deployment',
              items: dispatchItemsData,
              totalAmount: totalSum,
              invoiceNo
            };

            setDispatchLogs(prev => [newDispatchLog, ...prev]);
            
            // Pop up invoice viewer automatically
            setActiveInvoice(newDispatchLog);

            // Clear Form
            setDispatchForm({
              customerName: '',
              personName: '',
              date: new Date().toISOString().split('T')[0],
              notes: '',
              items: [{ productId: '', qty: 1 }]
            });
            triggerMessage('success', 'Robotics dispatch completed successfully! Invoice generated.');
          };

            window.print();

          const getCategoryFallbackImage = (category) => {

                return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%2338bdf8" stroke-width="1.5"><rect x="2" y="7" width="20" height="12" rx="2"/><line x1="6" y1="7" x2="6" y2="4"/><line x1="18" y1="7" x2="18" y2="4"/><path d="M12 11l-2 3h4l-2 3"/></svg>';
              case 'Actuators':

              case 'Controllers':

              case 'Sensors':

            }
          };

          const resetToDemoData = () => {
            if (confirm("Reset all data back to demo records? Local custom changes will be deleted.")) {
              setComponents(demoComponents);
              setProducts(demoProducts);
              setPurchases(demoPurchaseLogs);
              setBuildLogs(demoBuildLogs);
              setDispatchLogs(demoDispatchLogs);

          const handleExportData = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ components, products, purchases, buildLogs, dispatchLogs, issueLogs }, null, 2));
            const downloadAnchor = document.createElement('a');

            downloadAnchor.setAttribute("download", `Robotics_Inventory_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);

          const clearAllData = () => {

              setComponents([]);

              triggerMessage('success', 'Workspace cleared successfully.');
            }
          };

          const filteredComponents = useMemo(() => {
            return components.filter(c => {
              const matchSearch = c.sku.toLowerCase().includes(searchTerm.toLowerCase()) || c.name.toLowerCase().includes(searchTerm.toLowerCase());
              const matchCat = componentCategoryFilter === 'All' || c.category === componentCategoryFilter;

          return (

                    <Icons.Robot />

                    <h1 className="font-bold text-lg tracking-wider text-white">ROBOSMART INVENTORY</h1>
                    <p className="text-xs text-cyan-400 font-semibold uppercase tracking-widest">Enterprise Command Console</p>
                  </div>

                <div className="flex flex-wrap gap-2">
                  <button onClick={handleExportData} className="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 transition">Backup Database JSON</button>
                  <button onClick={resetToDemoData} className="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-cyan-950/45 hover:bg-cyan-900/50 text-cyan-300 border border-cyan-900/40 transition">Load Demo Data</button>
                  <button onClick={clearAllData} className="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-rose-950/40 hover:bg-rose-900/50 text-rose-300 border border-rose-900/40 transition">Clear All Data</button>
                </div>
              </header>

              {/* Feedback banners */}
              {successMessage && <div className="fixed top-20 right-6 z-50 bg-emerald-950/90 border border-emerald-500 text-emerald-200 px-5 py-3 rounded-lg shadow-xl font-semibold no-print">{successMessage}</div>}
              {errorMessage && <div className="fixed top-20 right-6 z-50 bg-rose-950/90 border border-rose-500 text-rose-200 px-5 py-3 rounded-lg shadow-xl font-semibold no-print">{errorMessage}</div>}

              {/* Navigation Tab links */}
              <nav className="no-print bg-slate-900 border-b border-slate-800 px-6 py-1 flex gap-1 overflow-x-auto whitespace-nowrap scrollbar-none">
                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'dashboard' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Dashboard</button>
                <button onClick={() => setActiveTab('components')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'components' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Components & SKU Registry</button>
                <button onClick={() => setActiveTab('batchIn')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'batchIn' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Batch Stock-In (Purchasing)</button>
                <button onClick={() => setActiveTab('issueOut')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'issueOut' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Material Issue Form (Stock-Out)</button>
                <button onClick={() => setActiveTab('productionAssembly')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'productionAssembly' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Manufacturing (BOM & Production)</button>
                <button onClick={() => setActiveTab('products')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'products' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Finished Goods Warehouse</button>
                <button onClick={() => setActiveTab('dispatches')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'dispatches' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Dispatches & Billing</button>
                <button onClick={() => setActiveTab('history')} className={`px-4 py-3.5 border-b-2 text-sm font-medium ${activeTab === 'history' ? 'border-cyan-400 text-cyan-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>Audit Logs</button>
              </nav>

              <main className="no-print flex-1 p-6 max-w-7xl mx-auto w-full">
                
                {/* A. DASHBOARD VIEW TAB */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-6">

                        <p className="text-xs font-semibold text-slate-400 uppercase">Robots Stock</p>

                      <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition">

                            type="file" 
                            accept="image/*" 
                            onChange={(e) => handleFileRead(e, (base64) => setNewProductForm(prev => ({ ...prev, image: base64 })))} 
                            className="w-full text-slate-400 file:mr-3 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-[10px] file:font-semibold file:bg-slate-850 file:text-cyan-400 hover:file:bg-slate-800 cursor-pointer" 
                          />
                          {newProductForm.image && <img src={newProductForm.image} className="w-full h-24 rounded object-cover mt-2.5 border border-slate-800" />}
                        </div>

                        {/* BOM Row Generator area */}
                        <div className="border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl space-y-3">
                          <h4 className="text-xs uppercase font-bold tracking-widest text-slate-300">Assemble Bill of Materials (BOM)</h4>
                          
                          <div className="grid grid-cols-5 gap-2 items-end">
                            <div className="col-span-3">
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Target SKU component</label>
                              <select
                                value={bomRowInput.sku}
                                onChange={(e) => setBomRowInput(prev => ({ ...prev, sku: e.target.value }))}
                                className="w-full bg-slate-900 border border-slate-700 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none"
                              >
                                <option value="">-- Choose Part SKU --</option>
                                {components.map(c => (
                                  <option key={c.sku} value={c.sku}>{c.sku} &middot; {c.name}</option>
                                ))}
                              </select>
                            </div>
                            <div className="col-span-1">
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Qty Req.</label>
                              <input 
                                type="number" 
                                min="1" 
                                value={bomRowInput.qty}
                                onChange={(e) => setBomRowInput(prev => ({ ...prev, qty: e.target.value }))}
                                className="w-full bg-slate-900 border border-slate-700 rounded px-2.5 py-1.5 text-xs text-white font-mono focus:outline-none text-center"
                              />
                            </div>
                            <div className="col-span-1">
                              <button 
                                type="button"
                                onClick={addBomRowItem}
                                className="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 text-xs font-bold py-2 rounded transition"
                              >
                                Add
                              </button>
                            </div>
                          </div>

                          {/* list of BOM components defined */}
                          <div className="mt-3 space-y-1.5 max-h-[120px] overflow-y-auto">
                            {newProductForm.bomList.map(item => {
                              const part = components.find(c => c.sku === item.sku);
                              return (
                                <div key={item.sku} className="bg-slate-900 px-3 py-1.5 rounded flex justify-between items-center text-xs border border-slate-800">
                                  <span className="font-mono text-slate-300 font-semibold">{item.sku} &middot; <span className="text-slate-400 font-normal">{part ? part.name : 'Unknown Part'}</span></span>
                                  <div className="flex items-center gap-2">
                                    <span className="font-mono font-bold text-cyan-400">qty: {item.qty}</span>
                                    <button 
                                      type="button" 
                                      onClick={() => removeBomRowItem(item.sku)}
                                      className="text-rose-500 hover:text-rose-400 font-bold px-1"
                                    >
                                      &times;
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                            {newProductForm.bomList.length === 0 && (
                              <p className="text-[11px] text-slate-500 italic text-center py-4">No materials added to BOM template yet. Add components above.</p>
                            )}
                          </div>
                        </div>

                        <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-800">
                          <button 
                            type="button" 
                            onClick={() => setModalType(null)}
                            className="px-4 py-2 bg-slate-950 border border-slate-800 rounded text-slate-300 text-xs font-bold"
                          >
                            Cancel
                          </button>
                          <button 
                            type="submit" 
                            className="px-4 py-2 bg-emerald-500 text-slate-950 font-bold rounded text-xs"
                          >
                            Save Robotics Schema
                          </button>
                        </div>
                      </form>
                    </div>
                  )}

                </div>
              )}

              {/* --- II. PROFESSIONAL INVOICE PRINT-PREVIEW DIALOG POPUP --- */}
              {activeInvoice && (
                <div className="fixed inset-0 z-50 bg-slate-950/90 flex items-center justify-center p-4 overflow-y-auto">
                  <div className="bg-white text-slate-900 w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-between p-6 md:p-8 no-print">
                    
                    {/* Invoice design content */}
                    <div id="print-area" className="bg-white text-slate-900 space-y-6">
                      
                      {/* Top Header layout */}
                      <div className="flex justify-between items-start border-b border-slate-200 pb-5">
                        <div>
                          <h2 className="text-xl font-black tracking-wider text-slate-950">ROBOSMART TECHNOLOGIES INC.</h2>
                          <p className="text-xs text-slate-500 font-medium mt-1">Robotics assembly plant & warehouses center</p>
                          <p className="text-[11px] text-slate-400 mt-0.5">Hyderabad, Telangana, India</p>
                        </div>
                        <div className="text-right">
                          <span className="text-xs uppercase font-extrabold tracking-widest text-slate-400 block">Dispatch Receipt Bill</span>
                          <span className="text-sm font-mono font-bold text-slate-950 mt-1 block">{activeInvoice.invoiceNo}</span>
                          <span className="text-xs text-slate-500 block mt-0.5">Date: {activeInvoice.date}</span>
                        </div>
                      </div>

                      {/* Recipient Credentials information */}
                      <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div>
                          <span className="text-[10px] uppercase font-black tracking-wider text-slate-400 block">Deliver to (Client):</span>
                          <h4 className="text-sm font-bold text-slate-950 mt-1">{activeInvoice.customerName}</h4>
                          <p className="text-xs text-slate-500 mt-0.5">Contact Person: {activeInvoice.contactPerson}</p>
                        </div>
                        <div>
                          <span className="text-[10px] uppercase font-black tracking-wider text-slate-400 block">Auditing Details:</span>
                          <p className="text-xs text-slate-600 mt-1">Authorized Dispatch Officer: Warehouse Head</p>
                          <p className="text-[11px] text-slate-500 mt-0.5">Log notes: {activeInvoice.notes}</p>
                        </div>
                      </div>

                      {/* Dispatched units product price table */}
                      <div className="border border-slate-200 rounded-xl overflow-hidden">
                        <table className="w-full text-xs text-left">
                          <thead className="bg-slate-100 text-slate-700 uppercase text-[10px] font-bold">
                            <tr>
                              <th className="px-4 py-2.5">Robot Model ID</th>
                              <th className="px-4 py-2.5">Product Name</th>
                              <th className="px-4 py-2.5 text-center">Qty Sent</th>
                              <th className="px-4 py-2.5 text-right">Unit Rate (₹)</th>
                              <th className="px-4 py-2.5 text-right">Subtotal Price</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 font-semibold text-slate-800">
                            {activeInvoice.items.map((item, idx) => (
                              <tr key={idx}>
                                <td className="px-4 py-3 font-mono text-slate-900">{item.productId}</td>
                                <td className="px-4 py-3 text-slate-950 font-bold">{item.productName}</td>
                                <td className="px-4 py-3 text-center">{item.qty} unit(s)</td>
                                <td className="px-4 py-3 text-right font-mono">₹{item.unitPrice.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                                <td className="px-4 py-3 text-right font-mono text-slate-950">₹{item.subtotal.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      {/* Cumulative pricing aggregate totals */}
                      <div className="flex justify-end pt-2">
                        <div className="w-64 space-y-2 text-right">
                          <div className="flex justify-between text-xs text-slate-500">
                            <span>SGST (9%)</span>
                            <span className="font-mono">₹{(activeInvoice.totalAmount * 0.09).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                          </div>
                          <div className="flex justify-between text-xs text-slate-500">
                            <span>CGST (9%)</span>
                            <span className="font-mono">₹{(activeInvoice.totalAmount * 0.09).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                          </div>
                          <div className="flex justify-between text-sm font-bold text-slate-950 border-t border-slate-200 pt-2">
                            <span>Gross Total Amount</span>
                            <span className="font-mono">₹{(activeInvoice.totalAmount * 1.18).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                          </div>
                        </div>
                      </div>

                    </div>

                    {/* Operational control drawer */}
                    <div className="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-100 no-print">
                      <button 
                        onClick={() => setActiveInvoice(null)}
                        className="px-4 py-2 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-700 bg-slate-100 transition"
                      >
                        Close Bill
                      </button>
                      <button 
                        onClick={handlePrintInvoice}
                        className="px-5 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-xs font-bold transition shadow"
                      >
                        Print / Download Invoice Receipt
                      </button>
                    </div>

                  </div>
                </div>
              )}

              {/* --- REAL PRINT LAYOUT HIDDEN CONTAINER --- */}
              {activeInvoice && (
                <div className="hidden print-only bg-white text-black p-10 font-sans space-y-8">
                  <div className="flex justify-between items-start border-b-2 border-black pb-5">
                    <div>
                      <h2 className="text-2xl font-black tracking-wider text-black">ROBOSMART TECHNOLOGIES INC.</h2>
                      <p className="text-sm font-medium mt-1">Robotics assembly plant & warehouses center</p>
                      <p className="text-xs mt-0.5">Hyderabad, Telangana, India</p>
                    </div>
                    <div className="text-right">
                      <span className="text-xs uppercase font-extrabold tracking-widest text-slate-400 block">Dispatch Receipt Bill</span>
                      <span className="text-base font-mono font-bold mt-1 block">{activeInvoice.invoiceNo}</span>
                      <span className="text-sm block mt-0.5">Date: {activeInvoice.date}</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4 bg-gray-100 p-4 rounded-xl border border-gray-300">
                    <div>
                      <span className="text-xs uppercase font-black tracking-wider text-gray-500 block">Deliver to (Client):</span>
                      <h4 className="text-base font-bold mt-1">{activeInvoice.customerName}</h4>
                      <p className="text-sm mt-0.5">Contact Person: {activeInvoice.contactPerson}</p>
                    </div>
                    <div>
                      <span className="text-xs uppercase font-black tracking-wider text-gray-500 block">Auditing Details:</span>
                      <p className="text-sm mt-1">Authorized Dispatch Officer: Warehouse Head</p>
                      <p className="text-xs mt-0.5">Log notes: {activeInvoice.notes}</p>
                    </div>
                  </div>

                  <div className="border border-gray-300 rounded-xl overflow-hidden">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-gray-100 text-gray-700 uppercase font-bold text-xs">
                        <tr>
                          <th className="px-4 py-2.5">Robot Model ID</th>
                          <th className="px-4 py-2.5">Product Name</th>
                          <th className="px-4 py-2.5 text-center">Qty Sent</th>
                          <th className="px-4 py-2.5 text-right">Unit Rate (₹)</th>
                          <th className="px-4 py-2.5 text-right">Subtotal Price</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-300 font-semibold text-black">
                        {activeInvoice.items.map((item, idx) => (
                          <tr key={idx}>
                            <td className="px-4 py-3 font-mono">{item.productId}</td>
                            <td className="px-4 py-3 font-bold">{item.productName}</td>
                            <td className="px-4 py-3 text-center">{item.qty} unit(s)</td>
                            <td className="px-4 py-3 text-right font-mono">₹{item.unitPrice.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                            <td className="px-4 py-3 text-right font-mono">₹{item.subtotal.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  <div className="flex justify-end pt-2">
                    <div className="w-64 space-y-2 text-right text-sm">
                      <div className="flex justify-between">
                        <span>SGST (9%)</span>
                        <span className="font-mono">₹{(activeInvoice.totalAmount * 0.09).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                      </div>
                      <div className="flex justify-between">
                        <span>CGST (9%)</span>
                        <span className="font-mono">₹{(activeInvoice.totalAmount * 0.09).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                      </div>
                      <div className="flex justify-between font-bold border-t border-black pt-2 text-base">
                        <span>Gross Total Amount</span>
                        <span className="font-mono">₹{(activeInvoice.totalAmount * 1.18).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
